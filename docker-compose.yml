version: '3.8'

services:
  watchtower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchtower_app
    working_dir: /app/scripts
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - D:\Watchtower_Ops:/app:rw
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - OLLAMA_HOST=192.168.68.110:11434
    depends_on:
      - influxdb
      - grafana
      - spiderfoot
      - ollama
    restart: unless-stopped
    networks:
      - watchtower-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: watchtower_ollama
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - watchtower-network

  influxdb:
    image: influxdb:2.7
    container_name: watchtower_influxdb
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    env_file:
      - .env.influx
    restart: unless-stopped
    networks:
      - watchtower-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: watchtower_grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
    env_file:
      - .env.grafana
    depends_on:
      - influxdb
    restart: unless-stopped
    networks:
      - watchtower-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  spiderfoot:
    build:
      context: ./spiderfoot
    image: spiderfoot:latest
    container_name: spiderfoot
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./data/spiderfoot:/var/lib/spiderfoot
    restart: unless-stopped
    networks:
      - watchtower-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3

  watchtower-db:
    image: postgres:16-alpine
    container_name: watchtower_recon_db
    restart: always
    environment:
      - POSTGRES_USER=watchtower_admin
      - POSTGRES_PASSWORD=watchtower_secure_2026
      - POSTGRES_DB=recon_data
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - watchtower-network

volumes:
  influxdb_data:
  grafana_data:
  spiderfoot_data:
  ollama_data:

networks:
  watchtower-network:
    driver: bridge
